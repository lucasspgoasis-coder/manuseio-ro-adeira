<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Roçadeiras - SPG Oásis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .header-bg { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
        .modal-overlay { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-focus { transition: all 0.2s; border: 2px solid transparent; }
        .input-focus:focus { border-color: #10b981; background-color: white; }
        
        #captureContainer { padding: 20px; background: #f8fafc; width: 500px; position: fixed; left: -9999px; }
        .capture-header { background: #022c22; color: white; padding: 20px; text-align: center; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="header-bg text-white py-6 px-6 shadow-xl mb-8">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-emerald-500/20 p-2 md:p-3 rounded-2xl hidden sm:block">
                    <i class="fas fa-tools text-2xl md:text-3xl text-emerald-400"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-2xl font-black uppercase tracking-tight leading-tight">Gestão de Roçadeiras</h1>
                    <p class="text-emerald-200/70 font-medium text-xs md:sm">Oásis • Controle de Operações</p>
                </div>
            </div>
            <div class="flex-shrink-0">
                <img src="https://i.imgur.com/rB1Lk8y.png" alt="Logo Oásis" class="h-12 md:h-16 drop-shadow-md object-contain">
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Formulário -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-3xl p-8 card-shadow border border-slate-100 sticky top-4">
                    <div class="flex items-center justify-between mb-8">
                        <h2 id="formTitle" class="text-xl font-bold text-slate-800 uppercase tracking-tight">Novo Registro</h2>
                        <button onclick="resetForm()" class="text-xs font-bold text-slate-400 hover:text-red-500 flex items-center gap-1 uppercase transition-colors">
                            <i class="fas fa-undo"></i> Limpar
                        </button>
                    </div>

                    <form id="mainForm" class="space-y-5">
                        <input type="hidden" id="editId" value="">
                        <div class="grid grid-cols-1 gap-4">
                            <div class="space-y-1">
                                <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Data</label>
                                <input type="date" id="formData" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 outline-none input-focus">
                            </div>
                            
                            <div class="space-y-1">
                                <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Localização</label>
                                <select id="formBloco" onchange="toggleOthers('formBloco', 'outrosBloco')" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 outline-none input-focus">
                                    <optgroup label="Blocos Letras">
                                        <option value="BLOCO A">BLOCO A</option>
                                        <option value="BLOCO B">BLOCO B</option>
                                        <option value="BLOCO C">BLOCO C</option>
                                    </optgroup>
                                    <optgroup label="Blocos Números">
                                        <option value="BLOCO 01">BLOCO 01</option>
                                        <option value="BLOCO 02">BLOCO 02</option>
                                        <option value="BLOCO 03">BLOCO 03</option>
                                        <option value="BLOCO 04">BLOCO 04</option>
                                        <option value="BLOCO 05">BLOCO 05</option>
                                        <option value="BLOCO 06">BLOCO 06</option>
                                        <option value="BLOCO 07">BLOCO 07</option>
                                        <option value="BLOCO 08">BLOCO 08</option>
                                        <option value="BLOCO 09">BLOCO 09</option>
                                        <option value="BLOCO 10">BLOCO 10</option>
                                        <option value="BLOCO 11">BLOCO 11</option>
                                        <option value="BLOCO 12">BLOCO 12</option>
                                        <option value="BLOCO 13">BLOCO 13</option>
                                        <option value="BLOCO 14">BLOCO 14</option>
                                    </optgroup>
                                    <optgroup label="Outros">
                                        <option value="ÁREA GERAL">ÁREA GERAL</option>
                                        <option value="OUTROS">OUTROS (DIGITAR)</option>
                                    </optgroup>
                                </select>
                                <input type="text" id="outrosBloco" placeholder="Qual o Bloco/Local?" class="hidden mt-2 w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 font-bold text-emerald-800 outline-none uppercase">
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="grid grid-cols-1 gap-3">
                                <div class="space-y-1">
                                    <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Operador</label>
                                    <select id="formOperador" onchange="toggleOthers('formOperador', 'outrosOperador')" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 outline-none input-focus">
                                        <option value="EDUARDO">EDUARDO</option>
                                        <option value="JOÃO">JOÃO</option>
                                        <option value="MESSIAS">MESSIAS</option>
                                        <option value="ROBERTO">ROBERTO</option>
                                        <option value="OUTROS">OUTROS (DIGITAR)</option>
                                    </select>
                                    <input type="text" id="outrosOperador" placeholder="Nome do Operador" class="hidden mt-2 w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 font-bold text-emerald-800 outline-none uppercase">
                                </div>
                                
                                <div class="space-y-1">
                                    <label class="text-[11px] font-black text-slate-400 uppercase ml-1">Equipamento</label>
                                    <select id="formEquip" onchange="toggleOthers('formEquip', 'outrosEquip')" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 font-bold text-slate-700 outline-none input-focus">
                                        <option value="ROÇADEIRA 01">ROÇADEIRA 01</option>
                                        <option value="ROÇADEIRA 02">ROÇADEIRA 02</option>
                                        <option value="ROÇADEIRA 03">ROÇADEIRA 03</option>
                                        <option value="ROÇADEIRA 04">ROÇADEIRA 04</option>
                                        <option value="ROÇADEIRA 05">ROÇADEIRA 05</option>
                                        <option value="OUTROS">OUTROS (DIGITAR)</option>
                                    </select>
                                    <input type="text" id="outrosEquip" placeholder="Qual Equipamento?" class="hidden mt-2 w-full bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-3 font-bold text-emerald-800 outline-none uppercase">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-100">
                            <div class="bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">
                                <span class="text-[10px] font-black text-emerald-700 uppercase block mb-2">Horário Manhã</span>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="time" id="m_inicio" class="w-full rounded-lg p-2 text-sm font-bold border border-emerald-200">
                                    <input type="time" id="m_fim" class="w-full rounded-lg p-2 text-sm font-bold border border-emerald-200">
                                </div>
                            </div>
                            <div class="bg-amber-50/50 p-4 rounded-2xl border border-amber-100">
                                <span class="text-[10px] font-black text-amber-700 uppercase block mb-2">Horário Tarde</span>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="time" id="t_inicio" class="w-full rounded-lg p-2 text-sm font-bold border border-amber-200">
                                    <input type="time" id="t_fim" class="w-full rounded-lg p-2 text-sm font-bold border border-amber-200">
                                </div>
                            </div>
                        </div>

                        <button type="button" id="btnSubmit" onclick="showConfirmModal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest transition-all">
                            Revisar e Salvar
                        </button>
                    </form>
                </div>
            </div>

            <!-- Listagem -->
            <div class="lg:col-span-7">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                    <div class="flex flex-col">
                        <h2 class="text-lg font-black text-slate-800 uppercase">Histórico Local</h2>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Dados salvos no navegador</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="downloadAllAsJPEG()" class="bg-emerald-600 text-white p-2 px-4 rounded-xl font-black text-[10px] shadow-lg shadow-emerald-100 flex items-center uppercase tracking-wider hover:bg-emerald-700 transition-all">
                            <i class="fas fa-camera mr-2"></i> Gerar Foto
                        </button>
                        <button onclick="exportExcel()" class="bg-white border border-slate-200 p-2 px-4 rounded-xl text-slate-600 hover:text-emerald-600 font-bold text-[10px] shadow-sm flex items-center uppercase">
                            <i class="fas fa-file-excel mr-2"></i> Excel
                        </button>
                    </div>
                </div>
                <div id="cardsList" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <!-- Área Oculta para Captura Unificada -->
    <div id="captureContainer">
        <div class="capture-header">
            <h1 class="font-black uppercase text-xl">Relatório de Operações</h1>
            <p id="captureDate" class="text-emerald-200 text-xs font-bold"></p>
        </div>
        <div id="captureList" class="p-4 space-y-4 bg-slate-50 border-x border-b border-slate-200 rounded-b-2xl">
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirmModal" class="fixed inset-0 z-50 modal-overlay hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden card-shadow">
            <div class="bg-emerald-600 p-6 text-white text-center">
                <h3 class="text-xl font-black uppercase">Resumo do Registro</h3>
                <p class="text-[10px] opacity-80 uppercase font-bold">Confira os dados abaixo</p>
            </div>
            <div class="p-8 space-y-4">
                <div id="confirmDataText" class="bg-slate-50 p-6 rounded-2xl border border-slate-100 text-sm space-y-3">
                </div>
                
                <div id="modalButtons" class="space-y-3 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Enviar para a planilha?</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="closeModal('confirmModal')" class="bg-slate-100 font-bold py-4 rounded-xl uppercase text-xs text-slate-500 hover:bg-slate-200 transition-colors">Corrigir</button>
                        <button onclick="saveRecord()" class="bg-emerald-600 text-white font-bold py-4 rounded-xl uppercase text-xs shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all">Sim, Salvar!</button>
                    </div>
                </div>

                <div id="successActions" class="hidden space-y-4 pt-2">
                    <div class="bg-emerald-50 text-emerald-700 p-4 rounded-xl text-center font-bold text-xs">
                        <i class="fas fa-check-circle text-lg mb-1 block"></i> REGISTRO SALVO COM SUCESSO!
                    </div>
                    <div class="grid grid-cols-1 gap-3">
                        <button onclick="sendWhatsapp()" class="w-full bg-[#25D366] text-white font-bold py-3 rounded-xl uppercase text-xs flex items-center justify-center gap-2 shadow-md">
                            <i class="fab fa-whatsapp text-lg"></i> Compartilhar no WhatsApp
                        </button>
                        <button onclick="closeModal('confirmModal'); resetForm();" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl uppercase text-xs shadow-md">
                             Próximo Registro
                        </button>
                    </div>
                </div>

                <div id="modalLoading" class="hidden text-center py-4">
                    <div class="loading-spinner mr-2"></div>
                    <span class="text-xs font-bold text-slate-500 uppercase">Sincronizando com a Planilha...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxQgPyAKlDqx_gllFnBkpWfHUF5NQr9btmiXxeugi3e54l-iPQ-T5mQVEHdmoVRNZHrbQ/exec";
        
        let registros = JSON.parse(localStorage.getItem('oasis_records')) || [];
        let currentRecord = null;

        window.onload = () => {
            document.getElementById('formData').valueAsDate = new Date();
            render();
        };

        function toggleOthers(selectId, inputId) {
            const select = document.getElementById(selectId);
            const input = document.getElementById(inputId);
            if (select.value === "OUTROS") {
                input.classList.remove('hidden');
                input.required = true;
                input.focus();
            } else {
                input.classList.add('hidden');
                input.required = false;
                input.value = "";
            }
        }

        function diffMinutes(start, end) {
            if (!start || !end) return 0;
            const s = start.split(':'), e = end.split(':');
            let minS = (parseInt(s[0]) * 60) + parseInt(s[1]);
            let minE = (parseInt(e[0]) * 60) + parseInt(e[1]);
            return minE < minS ? (minE + 1440) - minS : minE - minS;
        }

        function formatTimeFromMin(min) {
            const h = Math.floor(min / 60);
            const m = min % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function showConfirmModal() {
            const mi = document.getElementById('m_inicio').value;
            const mf = document.getElementById('m_fim').value;
            const ti = document.getElementById('t_inicio').value;
            const tf = document.getElementById('t_fim').value;
            
            let operador = document.getElementById('formOperador').value;
            if (operador === "OUTROS") operador = document.getElementById('outrosOperador').value.toUpperCase();

            let equip = document.getElementById('formEquip').value;
            if (equip === "OUTROS") equip = document.getElementById('outrosEquip').value.toUpperCase();

            let bloco = document.getElementById('formBloco').value;
            if (bloco === "OUTROS") bloco = document.getElementById('outrosBloco').value.toUpperCase();

            if(!operador || !equip || !bloco) {
                alert("Por favor, preencha todos os campos obrigatórios.");
                return;
            }

            const m_min = diffMinutes(mi, mf);
            const t_min = diffMinutes(ti, tf);
            const total = formatTimeFromMin(m_min + t_min);

            const data = {
                data: document.getElementById('formData').value.split('-').reverse().join('/'),
                rawDate: document.getElementById('formData').value,
                operador: operador,
                bloco: bloco,
                equip: equip,
                total: total,
                m: mi && mf ? `${mi} às ${mf}` : "Não trabalhou",
                t: ti && tf ? `${ti} às ${tf}` : "Não trabalhou",
                m_inicio: mi,
                m_fim: mf,
                t_inicio: ti,
                t_fim: tf,
                m_min: m_min,
                t_min: t_min,
                origOperador: document.getElementById('formOperador').value,
                origEquip: document.getElementById('formEquip').value,
                origBloco: document.getElementById('formBloco').value,
                outrosOperador: document.getElementById('outrosOperador').value,
                outrosEquip: document.getElementById('outrosEquip').value,
                outrosBloco: document.getElementById('outrosBloco').value
            };

            document.getElementById('confirmDataText').innerHTML = `
                <div class="flex justify-between border-b pb-1 uppercase"><b class="text-slate-400">DATA:</b> <span class="font-bold">${data.data}</span></div>
                <div class="flex justify-between border-b pb-1 uppercase"><b class="text-slate-400">OPERADOR:</b> <span class="font-bold text-emerald-700">${data.operador}</span></div>
                <div class="flex justify-between border-b pb-1 uppercase"><b class="text-slate-400">LOCAL:</b> <span class="font-bold">${data.bloco}</span></div>
                <div class="flex justify-between border-b pb-1 uppercase"><b class="text-slate-400">EQUIP:</b> <span class="font-bold">${data.equip}</span></div>
                <div class="pt-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-1 tracking-widest">Turnos</p>
                    <div class="grid grid-cols-2 gap-2 text-[11px]">
                        <div class="bg-emerald-50 p-2 rounded-lg"><b>MANHÃ:</b><br>${data.m}</div>
                        <div class="bg-amber-50 p-2 rounded-lg"><b>TARDE:</b><br>${data.t}</div>
                    </div>
                </div>
                <div class="text-center pt-2">
                    <p class="text-sm font-black text-emerald-600 uppercase">Tempo Total: ${data.total}h</p>
                </div>
            `;
            
            currentRecord = data;
            document.getElementById('modalButtons').classList.remove('hidden');
            document.getElementById('successActions').classList.add('hidden');
            document.getElementById('confirmModal').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function saveRecord() {
            document.getElementById('modalButtons').classList.add('hidden');
            document.getElementById('modalLoading').classList.remove('hidden');

            const editId = document.getElementById('editId').value;
            const periodo = (currentRecord.m_min > 0 && currentRecord.t_min > 0) ? "Integral" : (currentRecord.m_min > 0 ? "Manhã" : "Tarde");

            // Criando FormData para garantir compatibilidade total com o Script do Google
            const formData = new FormData();
            formData.append("Data", currentRecord.data);
            formData.append("Periodo", periodo);
            formData.append("Operador", currentRecord.operador);
            formData.append("Equipamento", currentRecord.equip);
            formData.append("Localização", currentRecord.bloco);
            formData.append("Horário manhã", currentRecord.m);
            formData.append("Horário Tarde", currentRecord.t);
            formData.append("Total minutos Manhã", currentRecord.m_min);
            formData.append("Total minutos Tarde", currentRecord.t_min);

            try {
                // Usando a técnica de fetch com redirecionamento para o Script do Google
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Mantido no-cors pois Scripts do Google não retornam headers de CORS corretamente
                });

                // Se chegou aqui, consideramos sucesso (no-cors não permite ler a resposta, mas o envio ocorre)
                if (editId) {
                    const index = registros.findIndex(r => r.id == editId);
                    registros[index] = { ...currentRecord, id: Number(editId) };
                } else {
                    const recordLocal = { ...currentRecord, id: Date.now() };
                    registros.unshift(recordLocal); // Adiciona no início da lista
                }
                
                localStorage.setItem('oasis_records', JSON.stringify(registros));
                
                // Feedback visual de sucesso
                document.getElementById('modalLoading').classList.add('hidden');
                document.getElementById('successActions').classList.remove('hidden');
                render();
                
            } catch (error) {
                console.error("Erro no envio:", error);
                alert("Falha na conexão. Verifique sua internet ou a URL do script.");
                document.getElementById('modalButtons').classList.remove('hidden');
                document.getElementById('modalLoading').classList.add('hidden');
            }
        }

        function render() {
            const list = document.getElementById('cardsList');
            if (registros.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-slate-300 font-bold uppercase text-[10px] border-2 border-dashed rounded-3xl border-slate-200">Sem registros recentes</div>`;
                return;
            }

            list.innerHTML = registros.map(r => `
                <div id="card-${r.id}" class="bg-white p-6 rounded-3xl border border-slate-100 card-shadow relative group overflow-hidden">
                    <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <button onclick="editRecord(${r.id})" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteRecord(${r.id})" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    
                    <div class="flex justify-between items-start mb-4 pr-24">
                        <div>
                            <span class="bg-slate-100 text-slate-500 text-[10px] font-black px-2 py-1 rounded-md uppercase">${r.data}</span>
                            <h4 class="font-black text-slate-800 text-lg uppercase mt-1 tracking-tight">${r.operador}</h4>
                        </div>
                        <div class="text-right">
                             <span class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md uppercase">${r.bloco}</span>
                             <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">${r.equip}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-[11px] border-t border-slate-50 pt-4">
                        <div>
                            <p class="text-slate-400 font-black text-[9px] uppercase tracking-tighter">Manhã</p>
                            <p class="font-bold text-slate-700">${r.m}</p>
                        </div>
                        <div>
                            <p class="text-slate-400 font-black text-[9px] uppercase tracking-tighter">Tarde</p>
                            <p class="font-bold text-slate-700">${r.t}</p>
                        </div>
                    </div>
                    <div class="mt-4 pt-3 border-t border-emerald-100 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tempo</span>
                        <span class="text-xl font-black text-emerald-600">${r.total}h</span>
                    </div>
                </div>
            `).join('');
        }

        async function downloadAllAsJPEG() {
            if (registros.length === 0) return alert("Não há registros para exportar.");
            
            const captureList = document.getElementById('captureList');
            const captureDateText = document.getElementById('captureDate');
            captureList.innerHTML = ''; 
            
            captureDateText.innerText = `Gerado em: ${new Date().toLocaleString()}`;

            registros.forEach(r => {
                const card = document.getElementById(`card-${r.id}`).cloneNode(true);
                const btns = card.querySelector('.z-10');
                if (btns) btns.remove();
                card.classList.remove('card-shadow', 'group');
                card.classList.add('border-slate-200');
                captureList.appendChild(card);
            });

            const container = document.getElementById('captureContainer');
            
            try {
                const canvas = await html2canvas(container, { scale: 2, useCORS: true });
                const link = document.createElement('a');
                link.download = `Relatorio_Oasis_${new Date().getTime()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            } catch (e) {
                alert("Erro ao gerar imagem.");
            }
        }

        function editRecord(id) {
            const record = registros.find(r => r.id == id);
            if (!record) return;

            document.getElementById('editId').value = record.id;
            document.getElementById('formData').value = record.rawDate;
            document.getElementById('formOperador').value = record.origOperador;
            document.getElementById('formEquip').value = record.origEquip;
            document.getElementById('formBloco').value = record.origBloco;

            toggleOthers('formOperador', 'outrosOperador');
            toggleOthers('formEquip', 'outrosEquip');
            toggleOthers('formBloco', 'outrosBloco');

            if (record.origOperador === "OUTROS") document.getElementById('outrosOperador').value = record.outrosOperador;
            if (record.origEquip === "OUTROS") document.getElementById('outrosEquip').value = record.outrosEquip;
            if (record.origBloco === "OUTROS") document.getElementById('outrosBloco').value = record.outrosBloco;

            document.getElementById('m_inicio').value = record.m_inicio || "";
            document.getElementById('m_fim').value = record.m_fim || "";
            document.getElementById('t_inicio').value = record.t_inicio || "";
            document.getElementById('t_fim').value = record.t_fim || "";

            document.getElementById('formTitle').innerText = "Editando Registro";
            document.getElementById('btnSubmit').innerText = "Atualizar Dados";
            document.getElementById('btnSubmit').classList.replace('bg-emerald-600', 'bg-blue-600');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteRecord(id) {
            if (confirm("Excluir registro local?")) {
                registros = registros.filter(r => r.id != id);
                localStorage.setItem('oasis_records', JSON.stringify(registros));
                render();
            }
        }

        function sendWhatsapp() {
            const text = `*RELATÓRIO OÁSIS - ROÇADEIRA*\n\n` +
                         `📅 *Data:* ${currentRecord.data}\n` +
                         `👤 *Operador:* ${currentRecord.operador}\n` +
                         `📍 *Local:* ${currentRecord.bloco}\n` +
                         `⚙️ *Equipamento:* ${currentRecord.equip}\n\n` +
                         `🌅 *Manhã:* ${currentRecord.m}\n` +
                         `🌇 *Tarde:* ${currentRecord.t}\n\n` +
                         `⏳ *TOTAL:* ${currentRecord.total}h\n\n` +
                         `_Gestão SPG Oásis_`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        function resetForm() {
            document.getElementById('mainForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('outrosOperador').classList.add('hidden');
            document.getElementById('outrosEquip').classList.add('hidden');
            document.getElementById('outrosBloco').classList.add('hidden');
            document.getElementById('formData').valueAsDate = new Date();
            document.getElementById('formTitle').innerText = "Novo Registro";
            document.getElementById('btnSubmit').innerText = "Revisar e Salvar";
            document.getElementById('btnSubmit').classList.replace('bg-blue-600', 'bg-emerald-600');
        }

        function exportExcel() {
            const excelData = registros.map(r => ({
                Data: r.data, Operador: r.operador, Local: r.bloco, Equipamento: r.equip,
                Manhã: r.m, Tarde: r.t, Total: r.total + 'h'
            }));
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Histórico");
            XLSX.writeFile(wb, "Relatorio_Oasis.xlsx");
        }
    </script>
</body>
</html>
