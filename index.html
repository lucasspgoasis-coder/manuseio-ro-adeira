<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura Diária de Manuseio da Roçadeira - SPG Oásis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bibliotecas para Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }

        .header-bg {
            background: linear-gradient(135deg, #054a36 0%, #033023 100%);
            border-bottom: 4px solid #02261c;
        }

        /* Estilos da Área de Exportação */
        #exportArea {
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 1000px;
            background-color: #f8fafc;
            min-height: 1400px;
        }

        .export-header {
            background-color: #064e3b;
            padding: 60px 50px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .export-card {
            background: white;
            border-radius: 35px;
            padding: 35px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
        }

        .export-data-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Estilos do Formulário */
        .input-group-icon { position: relative; }
        .input-group-icon i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }
        .input-group-icon input, .input-group-icon select { padding-left: 46px !important; }

        .card-base {
            border-radius: 1.5rem;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="header-bg text-white shadow-2xl mb-8">
        <div class="max-w-[1400px] mx-auto px-6 py-6">
            <div class="flex justify-between items-center">
                <div class="flex-grow">
                    <div class="flex items-center space-x-3">
                        <div class="bg-emerald-500/20 p-2 rounded-lg">
                            <i class="fas fa-tractor text-emerald-400 text-2xl"></i>
                        </div>
                        <h1 class="text-xl md:text-2xl font-black tracking-tight uppercase">Leitura de Roçadeiras</h1>
                    </div>
                    <h2 class="text-lg font-medium text-emerald-100/80 mt-1">Oásis • Sistema de Gestão</h2>
                </div>
                <img src="https://i.imgur.com/rB1Lk8y.png" alt="Logo" class="w-20 h-20 object-contain">
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-4 md:px-8">
        <!-- Botões de Ação -->
        <div class="flex flex-wrap gap-3 mb-8 justify-end">
            <button onclick="exportarExcel()" class="bg-white hover:bg-emerald-50 text-emerald-700 font-bold py-3 px-5 rounded-xl shadow-sm border border-emerald-100 flex items-center space-x-2 text-xs uppercase">
                <i class="fas fa-file-excel"></i><span>Planilha</span>
            </button>
            <button onclick="exportar('jpg')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-5 rounded-xl shadow-sm flex items-center space-x-2 text-xs uppercase">
                <i class="fab fa-whatsapp"></i><span>Exportar JPG</span>
            </button>
            <button onclick="exportar('pdf')" class="bg-slate-900 hover:bg-black text-white font-bold py-3 px-5 rounded-xl shadow-sm flex items-center space-x-2 text-xs uppercase">
                <i class="fas fa-file-pdf"></i><span>Exportar PDF</span>
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Formulário -->
            <div class="lg:col-span-4">
                <div class="bg-white rounded-[1.5rem] p-6 border border-slate-200 shadow-xl sticky top-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 id="formTitle" class="text-lg font-black text-slate-800 uppercase tracking-tight">Novo Registro</h2>
                        <i class="fas fa-plus-circle text-emerald-500"></i>
                    </div>
                    
                    <form id="rocadeiraForm" class="space-y-5">
                        <input type="hidden" id="editId" value="">
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1">Data</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-calendar-alt"></i>
                                    <input type="date" id="data" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm outline-none focus:border-emerald-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1">Período</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-clock"></i>
                                    <select id="periodo" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold text-sm bg-white outline-none focus:border-emerald-500">
                                        <option value="MANHÃ">MANHÃ</option>
                                        <option value="TARDE">TARDE</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1">Operador</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-user"></i>
                                    <select id="operadorSelect" required onchange="toggleOutroOperador()" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="EDUARDO">EDUARDO</option>
                                        <option value="MESSIAS">MESSIAS</option>
                                        <option value="OUTRO">OUTRO...</option>
                                    </select>
                                </div>
                                <div id="outroOperadorContainer" class="mt-2 hidden">
                                    <input type="text" id="operadorOutro" class="w-full px-4 py-2 rounded-lg border border-slate-200 font-bold uppercase text-sm" placeholder="Nome do Operador">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1">Equipamento</label>
                                <div class="input-group-icon">
                                    <i class="fas fa-gas-pump"></i>
                                    <select id="equipamento" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                        <option value="Roçadeira 01">Roçadeira 01</option>
                                        <option value="Roçadeira 02">Roçadeira 02</option>
                                        <option value="Roçadeira 03">Roçadeira 03</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase mb-1.5 ml-1">Localização</label>
                            <div class="input-group-icon">
                                <i class="fas fa-map-marker-alt"></i>
                                <select id="bloco" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                    <script>
                                        for(let i=1; i<=15; i++) {
                                            let b = `BLOCO ${String(i).padStart(2, '0')}`;
                                            document.write(`<option value="${b}">${b}</option>`);
                                        }
                                    </script>
                                    <option value="ÁREA GERAL">ÁREA GERAL</option>
                                </select>
                            </div>
                        </div>

                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                             <p class="text-[9px] font-black text-slate-400 uppercase mb-3 text-center tracking-widest">Horário do Turno</p>
                             <div class="grid grid-cols-2 gap-4">
                                 <div class="space-y-1">
                                    <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">Início</label>
                                    <div class="input-group-icon">
                                        <i class="fas fa-hourglass-start"></i>
                                        <input type="time" id="horaInicio" required class="w-full px-3 py-2.5 rounded-lg border border-slate-200 font-bold text-sm">
                                    </div>
                                 </div>
                                 <div class="space-y-1">
                                    <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">Fim</label>
                                    <div class="input-group-icon">
                                        <i class="fas fa-hourglass-end"></i>
                                        <input type="time" id="horaFim" required class="w-full px-3 py-2.5 rounded-lg border border-slate-200 font-bold text-sm">
                                    </div>
                                 </div>
                             </div>
                        </div>

                        <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center">
                            <span class="text-[9px] font-black text-emerald-400 uppercase tracking-widest">Tempo no Turno</span>
                            <span id="displayTempoTotal" class="text-xl font-black text-white">00:00h</span>
                        </div>

                        <div class="input-group-icon">
                            <i class="fas fa-check-circle"></i>
                            <select id="status" required class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold bg-white text-sm">
                                <option value="Operacional">Operacional (OK)</option>
                                <option value="Manutenção Necessária">Manutenção Necessária</option>
                                <option value="Ajuste de Lâmina">Ajuste de Lâmina</option>
                            </select>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl shadow-lg uppercase text-xs tracking-widest hover:bg-emerald-800 transition-all active:scale-[0.98]">Salvar Registro</button>
                    </form>
                </div>
            </div>

            <!-- Listagem Dinâmica -->
            <div class="lg:col-span-8">
                <div id="cardsGrid" class="grid grid-cols-1 gap-6"></div>
                <div id="emptyState" class="py-24 text-center bg-white rounded-[2rem] border-2 border-dashed border-slate-200">
                    <i class="fas fa-clipboard-list text-slate-200 text-6xl mb-4"></i>
                    <p class="text-slate-300 font-black uppercase text-[10px] tracking-[0.3em]">Nenhum registro encontrado</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ÁREA DE EXPORTAÇÃO (Oculta) -->
    <div id="exportArea">
        <div class="export-header">
            <div>
                <h1 class="text-4xl font-black uppercase tracking-tight">Relatório Diário • Manuseio Roçadeiras</h1>
                <h2 class="text-2xl font-bold text-emerald-200/80">OÁSIS - CONTROLE OPERACIONAL</h2>
                <div class="h-1.5 w-48 bg-emerald-400 my-6 rounded-full"></div>
                <p id="exportMeta" class="text-xl font-bold tracking-wide">Data: --/--/---- • Semana --</p>
            </div>
            <img src="https://i.imgur.com/rB1Lk8y.png" class="w-32 h-32">
        </div>

        <div class="p-12">
            <div id="exportListFull" class="space-y-8"></div>
            
            <div class="mt-20 pt-10 border-t border-slate-200 flex justify-between items-end">
                <div>
                    <p class="text-slate-400 font-black uppercase text-[10px] tracking-widest">Resumo do Dia</p>
                    <p id="resumoGeralExport" class="text-2xl font-black text-slate-800">Total: 0 Registros</p>
                </div>
                <div class="text-right">
                    <p class="text-slate-400 font-black uppercase text-[10px] tracking-widest mb-4">Assinatura do Responsável</p>
                    <div class="h-px w-64 bg-slate-300"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let registros = [];
        const dataInput = document.getElementById('data');
        const periodoInput = document.getElementById('periodo');
        const hInicio = document.getElementById('horaInicio');
        const hFim = document.getElementById('horaFim');
        const displayTempo = document.getElementById('displayTempoTotal');
        const editIdInput = document.getElementById('editId');

        function toggleOutroOperador() {
            const opSelect = document.getElementById('operadorSelect');
            const opOutroCont = document.getElementById('outroOperadorContainer');
            opOutroCont.classList.toggle('hidden', opSelect.value !== 'OUTRO');
        }

        function getWeek(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
        }

        function diffMinutes(start, end) {
            if (!start || !end) return 0;
            const s = start.split(':'), e = end.split(':');
            let minS = (parseInt(s[0]) * 60) + parseInt(s[1]);
            let minE = (parseInt(e[0]) * 60) + parseInt(e[1]);
            return minE < minS ? (minE + 1440) - minS : minE - minS;
        }

        function formatarTempo(minutosTotal) {
            const h = Math.floor(minutosTotal / 60);
            const m = minutosTotal % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        function calcularTempoTotal() {
            const total = diffMinutes(hInicio.value, hFim.value);
            const res = formatarTempo(total);
            displayTempo.innerText = res + "h";
            return { string: res, minutos: total };
        }

        [hInicio, hFim].forEach(i => i.addEventListener('change', calcularTempoTotal));

        dataInput.addEventListener('change', (e) => {
            const d = new Date(e.target.value + 'T00:00:00');
            const dataBr = e.target.value.split('-').reverse().join('/');
            const semana = getWeek(d);
            document.getElementById('exportMeta').innerText = `Data: ${dataBr} • Semana ${semana}`;
        });

        document.getElementById('rocadeiraForm').addEventListener('submit', e => {
            e.preventDefault();
            const opSelect = document.getElementById('operadorSelect');
            const opOutro = document.getElementById('operadorOutro');
            const tempo = calcularTempoTotal();
            
            const reg = {
                id: editIdInput.value ? parseInt(editIdInput.value) : Date.now(),
                periodo: periodoInput.value,
                dataIso: dataInput.value,
                data: dataInput.value.split('-').reverse().join('/'),
                operador: opSelect.value === 'OUTRO' ? opOutro.value.toUpperCase() : opSelect.value,
                bloco: document.getElementById('bloco').value.toUpperCase(),
                equip: document.getElementById('equipamento').value,
                horaInicio: hInicio.value,
                horaFim: hFim.value,
                minutos: tempo.minutos,
                status: document.getElementById('status').value.toUpperCase()
            };

            if(editIdInput.value) {
                const idx = registros.findIndex(r => r.id === reg.id);
                registros[idx] = reg;
            } else {
                registros.push(reg);
            }
            render();
            resetForm();
        });

        function resetForm() {
            document.getElementById('rocadeiraForm').reset();
            editIdInput.value = "";
            displayTempo.innerText = "00:00h";
            initDate();
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const exportList = document.getElementById('exportListFull');
            
            document.getElementById('emptyState').classList.toggle('hidden', registros.length > 0);
            document.getElementById('resumoGeralExport').innerText = `Total: ${registros.length} Registros`;

            // Agrupamento Inteligente
            const agrupados = {};
            registros.forEach(r => {
                const key = `${r.dataIso}-${r.operador}-${r.bloco}-${r.equip}`;
                if(!agrupados[key]) agrupados[key] = { manha: null, tarde: null };
                if(r.periodo === 'MANHÃ') agrupados[key].manha = r;
                else agrupados[key].tarde = r;
            });

            const keysSorted = Object.keys(agrupados).sort((a,b) => b.localeCompare(a));

            // Interface App
            grid.innerHTML = keysSorted.map(key => {
                const { manha, tarde } = agrupados[key];
                const main = manha || tarde;
                const totalMins = (manha ? manha.minutos : 0) + (tarde ? tarde.minutos : 0);
                
                return `
                <div class="card-base">
                    <div class="bg-slate-50 px-6 py-3 border-b border-slate-100 flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${main.data} • ${main.bloco}</span>
                        <div class="flex space-x-2">
                             <button onclick="editarTurno('${key}', 'MANHÃ')" class="text-xs font-bold text-emerald-600 hover:underline">Edit Manhã</button>
                             <button onclick="editarTurno('${key}', 'TARDE')" class="text-xs font-bold text-amber-600 hover:underline">Edit Tarde</button>
                        </div>
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1 mb-1">
                                    <i class="fas fa-id-card"></i> Operador
                                </p>
                                <h3 class="text-2xl font-black text-slate-800 uppercase leading-none">${main.operador}</h3>
                                <p class="text-sm font-bold text-slate-400 mt-2"><i class="fas fa-gas-pump mr-2"></i>${main.equip}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-300 uppercase">Tempo Acumulado</p>
                                <p class="text-2xl font-black text-emerald-600">${formatarTempo(totalMins)}h</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-3 rounded-xl border ${manha ? 'bg-white border-emerald-100 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'}">
                                <div class="flex items-center space-x-2 mb-2">
                                    <i class="fas fa-sun ${manha ? 'text-emerald-500' : 'text-slate-300'} text-xs"></i>
                                    <span class="text-[10px] font-black ${manha ? 'text-slate-700' : 'text-slate-400'} uppercase">Manhã</span>
                                </div>
                                <p class="text-lg font-black ${manha ? 'text-slate-800' : 'text-slate-300'}">${manha ? formatarTempo(manha.minutos)+'h' : '--:--'}</p>
                                ${manha ? `<p class="text-[8px] font-bold text-slate-400 uppercase mt-1">${manha.horaInicio} às ${manha.horaFim}</p>` : ''}
                            </div>
                            <div class="p-3 rounded-xl border ${tarde ? 'bg-white border-amber-100 shadow-sm' : 'bg-slate-50 border-dashed border-slate-200 opacity-60'}">
                                <div class="flex items-center space-x-2 mb-2">
                                    <i class="fas fa-cloud-sun ${tarde ? 'text-amber-500' : 'text-slate-300'} text-xs"></i>
                                    <span class="text-[10px] font-black ${tarde ? 'text-slate-700' : 'text-slate-400'} uppercase">Tarde</span>
                                </div>
                                <p class="text-lg font-black ${tarde ? 'text-slate-800' : 'text-slate-300'}">${tarde ? formatarTempo(tarde.minutos)+'h' : '--:--'}</p>
                                ${tarde ? `<p class="text-[8px] font-bold text-slate-400 uppercase mt-1">${tarde.horaInicio} às ${tarde.horaFim}</p>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // Exportação Visual
            exportList.innerHTML = keysSorted.map(key => {
                const { manha, tarde } = agrupados[key];
                const main = manha || tarde;
                const totalMins = (manha ? manha.minutos : 0) + (tarde ? tarde.minutos : 0);
                
                return `
                <div class="export-card">
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <p class="text-emerald-700 font-black text-sm uppercase tracking-widest mb-4"><i class="fas fa-map-marker-alt mr-2"></i>LOCAL: ${main.bloco}</p>
                            <div class="mb-2">
                                <p class="text-slate-400 font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">
                                    <i class="fas fa-user-circle text-lg"></i> Operador Responsável
                                </p>
                                <h3 class="text-5xl font-black text-slate-900 uppercase tracking-tighter">${main.operador}</h3>
                            </div>
                            <p class="text-xl font-bold text-slate-400 mt-2">${main.equip}</p>
                        </div>
                        <div class="bg-emerald-50 p-6 rounded-[30px] text-right border border-emerald-100">
                            <p class="text-[10px] font-black text-emerald-600 uppercase tracking-[0.3em] mb-1">Total do Dia</p>
                            <p class="text-6xl font-black text-emerald-700">${formatarTempo(totalMins)}h</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-8">
                        <div class="export-data-box" style="border-left: 10px solid #10b981;">
                            <div>
                                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Turno Manhã</p>
                                <p class="text-3xl font-black text-slate-800">${manha ? formatarTempo(manha.minutos)+'h' : 'SEM REGISTRO'}</p>
                                ${manha ? `<p class="text-sm font-bold text-emerald-600 mt-1">${manha.horaInicio} ➔ ${manha.horaFim}</p>` : ''}
                            </div>
                            <i class="fas fa-sun text-emerald-100 text-5xl"></i>
                        </div>
                        <div class="export-data-box" style="border-left: 10px solid #f59e0b;">
                            <div>
                                <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Turno Tarde</p>
                                <p class="text-3xl font-black text-slate-800">${tarde ? formatarTempo(tarde.minutos)+'h' : 'SEM REGISTRO'}</p>
                                ${tarde ? `<p class="text-sm font-bold text-amber-600 mt-1">${tarde.horaInicio} ➔ ${tarde.horaFim}</p>` : ''}
                            </div>
                            <i class="fas fa-cloud-sun text-amber-100 text-5xl"></i>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function editarTurno(key, periodo) {
            const parts = key.split('-');
            const dataIso = `${parts[0]}-${parts[1]}-${parts[2]}`;
            const op = parts[3];
            const bloco = parts[4];
            const equip = parts[5];
            
            const r = registros.find(x => x.dataIso === dataIso && x.operador === op && x.bloco === bloco && x.equip === equip && x.periodo === periodo);
            
            if(r) {
                editIdInput.value = r.id;
                dataInput.value = r.dataIso;
                periodoInput.value = r.periodo;
                document.getElementById('bloco').value = r.bloco;
                document.getElementById('equipamento').value = r.equip;
                hInicio.value = r.horaInicio;
                hFim.value = r.horaFim;
                
                const opSelect = document.getElementById('operadorSelect');
                if(['EDUARDO','MESSIAS'].includes(r.operador)) {
                    opSelect.value = r.operador;
                    document.getElementById('outroOperadorContainer').classList.add('hidden');
                } else {
                    opSelect.value = 'OUTRO';
                    document.getElementById('outroOperadorContainer').classList.remove('hidden');
                    document.getElementById('operadorOutro').value = r.operador;
                }
            } else {
                // Preencher para novo registro no mesmo bloco/operador
                dataInput.value = dataIso;
                periodoInput.value = periodo;
                document.getElementById('bloco').value = bloco;
                document.getElementById('equipamento').value = equip;
                const opSelect = document.getElementById('operadorSelect');
                if(['EDUARDO','MESSIAS'].includes(op)) {
                    opSelect.value = op;
                } else {
                    opSelect.value = 'OUTRO';
                    document.getElementById('outroOperadorContainer').classList.remove('hidden');
                    document.getElementById('operadorOutro').value = op;
                }
            }
            calcularTempoTotal();
            window.scrollTo({top:0, behavior:'smooth'});
        }

        async function exportar(tipo) {
            if(registros.length === 0) return;
            const area = document.getElementById('exportArea');
            const canvas = await html2canvas(area, { scale: 2, useCORS: true, backgroundColor: '#f8fafc' });

            if (tipo === 'jpg') {
                const link = document.createElement('a');
                link.download = `relatorio-rocadeira-${Date.now()}.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 0.9);
                link.click();
            } else {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = canvas.toDataURL('image/png');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
                pdf.save(`relatorio-rocadeira-${Date.now()}.pdf`);
            }
        }

        function exportarExcel() {
            if (registros.length === 0) return;
            const dadosExcel = registros.map(r => ({
                Data: r.data, Período: r.periodo, Operador: r.operador, Bloco: r.bloco,
                Equipamento: r.equip, Início: r.horaInicio, Fim: r.horaFim, "Minutos": r.minutos, Status: r.status
            }));
            const ws = XLSX.utils.json_to_sheet(dadosExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Leituras");
            XLSX.writeFile(wb, "relatorio_rocadeiras.xlsx");
        }

        function initDate() {
            const today = new Date().toISOString().split('T')[0];
            dataInput.value = today;
            dataInput.dispatchEvent(new Event('change'));
        }

        initDate();
    </script>
</body>
